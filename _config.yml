title: Archi
description: "An open-source AI agent for CMS computing operations at CERN, built at MIT."
url: "https://archi-physics.github.io"
baseurl: "/website"

markdown: kramdown
plugins:
  - jekyll-sitemap
permalink: /news/:year/:month/:day/:title/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - openspec
  - AGENTS.md
  - vendor

defaults:
  - scope:
      path: ""
    values:
      layout: default
